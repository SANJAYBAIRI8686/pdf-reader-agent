server {
    listen 80;
    server_name localhost;

    # Root endpoint serving compiled React static production code
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls directly to backend service
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        
        # Set proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CRITICAL: Disable buffering to allow Server-Sent Events (SSE) streaming answers
        # If buffering is ON, Nginx queues stream chunks and flushes them together, breaking streaming UX.
        proxy_buffering off;
        proxy_cache off;
        
        # Extend client read timeouts for slower AI/LLM models responses
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # System error pages redirection
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
